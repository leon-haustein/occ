<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <filter id="inner-bevel-press" x="-20%" y="-20%" width="140%" height="140%">
      <!-- 1. INNER SHADOW -->
      <feOffset dx="0.6" dy="0.6" in="SourceAlpha" result="off1"/>
      <feComposite operator="out" in="SourceAlpha" in2="off1" result="inv1"/>
      <feGaussianBlur stdDeviation="0.8" in="inv1" result="blur1"/>
      <feFlood flood-color="black" flood-opacity="0.1" result="f1"/>
      <feComposite operator="in" in="f1" in2="blur1" result="sh"/>
      <feComposite operator="atop" in="sh" in2="SourceGraphic" result="comp1"/>
      <!-- 2. INNER BEVEL HIGHLIGHT -->
      <feOffset dx="-0.4" dy="-0.4" in="SourceAlpha" result="off2"/>
      <feComposite operator="out" in="SourceAlpha" in2="off2" result="inv2"/>
      <feGaussianBlur stdDeviation="0.4" in="inv2" result="blur2"/>
      <feFlood flood-color="f4f0ea" flood-opacity="0.8" result="f2"/>
      <feComposite operator="in" in="f2" in2="blur2" result="hl"/>
      <feComposite operator="atop" in="hl" in2="comp1"/>
    </filter>
  </defs>
  <style>
    .txt {
      font-family: 'Arial Black', sans-serif;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: -0.8px;
      text-anchor: middle;
    }
  </style>
  <g transform="rotate(-35 25 25)">
    <text x="25" y="29" fill="#f4f0ea" filter="url(#inner-bevel-press)" class="txt">OVGU</text>
  </g>
  <g transform="rotate(55 75 75)">
    <text x="75" y="79" fill="#f4f0ea" filter="url(#inner-bevel-press)" class="txt">OVGU</text>
  </g>
</svg>
